services:
  mongodb:
      image: mongo:4.4
      container_name: mongodb_container
      ports:
        - "27017:27017"
      volumes:
        - ./mongo_data:/data/db
      healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
        interval: 10s
        timeout: 5s
        retries: 3
      networks:
        - mongo-net

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    #depends_on:
      #mongodb:
        #condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - mongo-net

  redis:
    image: redis:latest
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10    
    networks:
      - redis-net
    

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - 5540:5540
    networks:
      - redis-net
    volumes:
      - redis_insight:/db    

  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      #mongodb:
        #condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mongo-net
      - redis-net

networks:
  mongo-net:
  redis-net:

volumes:
  redis-data:
  redis_insight:
