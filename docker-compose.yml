version: "3.8"

services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin1234
    healthcheck:
      test: ["CMD", "mongo", "admin", "-u", "admin", "-p", "admin1234", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mongo-net

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure
    environment:
      # Usa los valores literales directamente
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin1234
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin1234@mongodb:27017/anti_social_net?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - mongo-net

  redis:
    image: redis:latest
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10    
    networks:
      - redis-net
    

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - 5540:5540
    networks:
      - redis-net
    volumes:
      - redis_insight:/db    

  api:
    build: .
    volumes:
      - .:/app              # Esto sincroniza tu código
      - ./uploads:/app/uploads # ESTA LÍNEA ES LA CLAVE
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # MUY IMPORTANTE: Usamos el nombre del servicio 'mongodb' y no 'localhost'
      - MONGO_URI=mongodb://admin:admin1234@mongodb:27017/anti_social_net?authSource=admin
      - PORT=8080
      - REDIS_PASSWORD=admin1234
    networks:
      - mongo-net
      - redis-net

networks:
  mongo-net:
  redis-net:

volumes:
  redis-data:
  redis_insight:
